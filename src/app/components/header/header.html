<header class="site-header">

  <div class="top-bar">
    <div class="container top-inner">

      <div class="brand-section">
        <img
          src="/images/samta-vihar-logo.jpeg"
          alt="समता बुद्धविहार"
          class="brand-logo"
        />

        <div class="brand-title-wrap">
          <h1>{{ t('brandName') }}</h1>

          <div class="panchashil-flag" aria-hidden="true">
            <span class="blue"></span>
            <span class="yellow"></span>
            <span class="red"></span>
            <span class="white"></span>
            <span class="orange"></span>
          </div>
        </div>
      </div>

      <div class="developer-text">
        <small>{{ t('developedBy') }}</small>
        <span>NIHON IT SOLUTIONS</span>
      </div>

    </div>
  </div>

  <div class="nav-bar">
    <div class="container nav-inner">

      <nav>
        <a routerLink="/">{{ t('home') }}</a>
        <a routerLink="/about">{{ t('about') }}</a>
        <a routerLink="/events">{{ t('events') }}</a>
        <a routerLink="/membership">{{ t('membership') }}</a>
        <a routerLink="/contact">{{ t('contact') }}</a>
      </nav>

      <div class="right-section">

        <button type="button" class="language-btn" (click)="toggleLanguage()">
          {{ t('languageBtn') }}
        </button>

        <a *ngIf="isLoggedIn() && isAdmin()" routerLink="/admin/dashboard" class="admin-btn">
          {{ t('admin') }}
        </a>

        <a *ngIf="!isLoggedIn()" routerLink="/login" class="login-btn">
          {{ t('login') }}
        </a>

        <button *ngIf="isLoggedIn()" (click)="logout()" class="logout-btn">
          {{ t('logout') }}
        </button>

      </div>

    </div>
  </div>

</header>
