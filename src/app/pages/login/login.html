<section class="page-banner">
  <div class="container">
    <h2>लॉगिन</h2>
  </div>
</section>

<section class="container section form-card">
  <div *ngIf="errorMessage()" class="error-message">
    {{ errorMessage() }}
  </div>

  <form (ngSubmit)="onLogin()">
    <div class="form-group">
      <label>वापरकर्ता नाव / ई-मेल</label>
      <input type="text" [(ngModel)]="loginData.username" name="username" />
    </div>

    <div class="form-group">
      <label>पासवर्ड</label>
      <input type="password" [(ngModel)]="loginData.password" name="password" />
    </div>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'लॉगिन होत आहे...' : 'लॉगिन करा' }}
    </button>
  </form>
</section>
