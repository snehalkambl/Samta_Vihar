<section class="page-banner">
  <div class="container">
    <h2>{{ 'forgot.title' | translate }}</h2>
    <p>{{ 'forgot.subtitle' | translate }}</p>
  </div>
</section>

<section class="container section form-card">

  <div *ngIf="successMessage()" class="success-message">
    {{ successMessage() }}
  </div>

  <div *ngIf="errorMessage()" class="error-message">
    {{ errorMessage() }}
  </div>

  <form>

    <div class="form-group">
      <label>{{ 'forgot.username' | translate }}</label>
      <input
        type="text"
        [(ngModel)]="formData.username"
        name="username"
        [readonly]="otpSent()"
      />
    </div>

    <button
      type="button"
      class="otp-btn"
      (click)="sendOtp()"
      [disabled]="loading() || otpSent()"
    >
      {{
        loading() && !otpSent()
          ? ('forgot.sendingOtp' | translate)
          : ('forgot.sendOtp' | translate)
      }}
    </button>

    <div *ngIf="otpSent()" class="otp-section">

      <div class="form-group">
        <label>OTP</label>
        <input
          type="text"
          [(ngModel)]="formData.otp"
          name="otp"
          maxlength="6"
        />
      </div>

      <div class="form-group">
        <label>{{ 'forgot.newPassword' | translate }}</label>
        <input
          type="password"
          [(ngModel)]="formData.newPassword"
          name="newPassword"
        />
      </div>

      <div class="form-group">
        <label>{{ 'forgot.confirmPassword' | translate }}</label>
        <input
          type="password"
          [(ngModel)]="formData.confirmPassword"
          name="confirmPassword"
        />
      </div>

      <button
        type="button"
        (click)="resetPassword()"
        [disabled]="loading()"
      >
        {{
          loading()
            ? ('forgot.resetting' | translate)
            : ('forgot.resetPassword' | translate)
        }}
      </button>

    </div>

    <div class="back-row">
      <a routerLink="/login">
        ← {{ 'forgot.backToLogin' | translate }}
      </a>
    </div>

  </form>
</section>
